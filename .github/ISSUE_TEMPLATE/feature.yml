name: "feat: 新功能"
description: 提出新功能需求
labels: ["enhancement"]
body:
  - type: markdown
    attributes:
      value: "## 新功能请求"
  - type: textarea
    id: description
    attributes:
      label: 描述
      description: 清晰描述这个功能做什么、为什么需要
    validations:
      required: true
  - type: textarea
    id: work
    attributes:
      label: 需要的工作
      description: 列出实现这个功能需要做的事
    validations:
      required: false
  - type: textarea
    id: files
    attributes:
      label: 相关文件
      description: 涉及哪些文件或模块
    validations:
      required: false
